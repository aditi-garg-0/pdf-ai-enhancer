
api:
  anthropic_api_key: your_key_here
  openai_api_key: ''
  claude_model: claude-opus-4-5
  claude_fast: claude-sonnet-4-20250514
  openai_model: gpt-4o
  max_concurrent_api_calls: 3
  api_retry_attempts: 5
  api_retry_min_wait: 1.0
  api_retry_max_wait: 60.0
  max_tokens_correction: 4096
  max_tokens_analysis: 2048
  max_tokens_summary: 1024

extraction:
  render_dpi: 300
  render_dpi_ocr: 400
  render_colorspace: RGB
  text_density_threshold: 0.05
  image_area_threshold: 0.1
  diagram_aspect_ratio_min: 0.2
  text_extract_mode: full
  extract_fonts: true
  table_extraction_method: all
  camelot_flavor: lattice

enhancement:
  enable_denoising: true
  denoise_strength: 10.0
  enable_clahe: true
  clahe_clip_limit: 3.0
  clahe_grid_size: 8
  enable_sharpening: true
  sharpen_sigma: 1.5
  sharpen_amount: 1.5

  # Super-resolution
  enable_super_resolution: true
  sr_model: RealESRGAN_x4plus_anime
  sr_outscale: 4.0
  sr_tile: 512
  sr_tile_pad: 10
  sr_half: true
  sr_gpu_id: 0

  # Selective SR (only upscale detected logo/diagram regions)
  selective_sr: true
  selective_sr_min_area: 100
  selective_sr_min_contour_area: 100

  # Vectorization / line-art
  enable_vectorization: true
  vectorize_threshold: 128
  vectorize_min_area: 50
  # If using potrace, ensure the binary is installed on the system

  # Face restoration
  enable_face_restoration: true
  face_model: GFPGANv1.4

  # Output format / compression
  output_format: PNG
  jpeg_quality: 97
  png_compress: 1

  # Logo / color preservation and final tuning
  saturation_boost: 1.05
  brightness_boost: 1.02
  final_unsharp: true
  final_unsharp_sigma: 1.0
  final_unsharp_amount: 0.5

ocr:
  engine_priority:
  - paddleocr
  - tesseract
  - easyocr
  tesseract_lang: eng
  tesseract_oem: 3
  tesseract_psm: 6
  tesseract_dpi: 300
  easyocr_langs:
  - en
  easyocr_gpu: true
  easyocr_detail: 1
  paddle_lang: en
  paddle_use_gpu: true
  paddle_use_angle_classifier: true
  min_confidence: 0.6
  ensemble_strategy: confidence
  enable_ai_correction: true
  enable_spell_correction: true
  enable_grammar_fix: true
  enable_unicode_fix: true

diagram:
  enable_ai_analysis: true
  enable_reconstruction: false
  enable_vectorization: true
  embed_as_vector: true
  min_diagram_size_px: 100
  diagram_types:
  - flowchart
  - schematic
  - graph
  - table
  - formula
  - equation
  - map
  - photo
  - logo

pipeline:
  pages: null
  skip_text_pages: false
  skip_image_pages: false
  workers: 4
  batch_size: 5
  output_dpi: 300
  output_suffix: _enhanced
  embed_searchable_text: true
  compress_output: true
  optimize_output: true
  enable_checkpoint: true
  checkpoint_db: /Users/aditigarg/pdf_ai_enhancer/.cache/pipeline_state.db
  compute_ssim: true
  compute_psnr: true
  save_report: true
